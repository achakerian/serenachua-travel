<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serenely Yours — Start your brief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Pinyon+Script&family=Special+Elite&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-start">

  <nav class="nav">
    <button class="nav__toggle" aria-label="Menu" onclick="this.closest('.nav').classList.toggle('open')">Menu</button>
    <div class="nav__links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="how-it-works.html">Gist</a>
      <a href="sample.html">Sample</a>
    </div>
    <a class="nav__brand" href="index.html">Serenely Yours,</a>
    <a class="nav__cta" href="contact.html" aria-current="page">Start</a>
  </nav>

  <main class="wrap slip-wrap">
    <!-- Static sites can't email form data. Point action= at a Formspree
         (or Netlify Forms) endpoint: replace YOUR_FORM_ID below. -->
    <form class="slip" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <div class="slip__top">
        <h1>Trip brief</h1>
        <span class="code">SCT · 005</span>
      </div>
      <div class="slip__body">
        <p>The more you tell me, the sharper the plan. I'll come back with an approach and a quote — no fee to ask.</p>
        <div class="form">

          <div class="form__row">
            <div class="field"><label for="name">Name</label><input id="name" name="name" type="text" required></div>
            <div class="field"><label for="email">Email</label><input id="email" name="email" type="email" required></div>
          </div>

          <div class="form__row">
            <div class="field"><label for="city">City</label><input id="city" name="city" type="text" placeholder="Where are you going?" required></div>
            <div class="field"><label for="hotel">Hotel / area</label><input id="hotel" name="hotel" type="text" placeholder="Where you're based"></div>
          </div>

          <div class="form__row">
            <div class="field"><label for="dates">Dates you're free</label><input id="dates" name="dates" type="text" placeholder="e.g. 12–15 Sept"></div>
            <div class="field"><label for="wake">Typical wake-up</label><input id="wake" name="wake_time" type="time" value="08:00"></div>
          </div>

          <div class="field">
            <span class="field-label">Interests</span>
            <div class="chips">
              <label class="chip"><input type="checkbox" name="interests" value="Sightseeing">Sightseeing</label>
              <label class="chip"><input type="checkbox" name="interests" value="Food">Quality food</label>
              <label class="chip"><input type="checkbox" name="interests" value="Hiking">Hiking</label>
              <label class="chip"><input type="checkbox" name="interests" value="Nature">Nature</label>
              <label class="chip"><input type="checkbox" name="interests" value="Art">Art &amp; museums</label>
              <label class="chip"><input type="checkbox" name="interests" value="Nightlife">Nightlife</label>
              <label class="chip"><input type="checkbox" name="interests" value="Shopping">Shopping</label>
              <label class="chip"><input type="checkbox" name="interests" value="Relax">Slow &amp; relaxed</label>
            </div>
          </div>

          <div class="form__row">
            <div class="field"><label for="budget">Daily budget guide</label><input id="budget" name="budget" type="text" placeholder="e.g. £150 pp/day"></div>
            <div class="field">
              <span class="field-label">Plan format</span>
              <div class="chips">
                <label class="chip"><input type="radio" name="format" value="Strict">Strict</label>
                <label class="chip"><input type="radio" name="format" value="Options">Options</label>
                <label class="chip"><input type="radio" name="format" value="Unsure">Not sure yet</label>
              </div>
            </div>
          </div>

          <div class="field">
            <label for="message">Anything else</label>
            <textarea id="message" name="message" placeholder="Who's travelling, the occasion, must-dos, must-avoids, dietary needs…"></textarea>
          </div>

          <div class="slip__submit">
            <button class="btn btn--ghost-dark" type="submit">Send brief <span class="btn__arrow">→</span></button>
            <span class="code">No fee to ask</span>
          </div>
        </div>
      </div>
    </form>
  </main>

  <footer class="foot">
    <span class="foot__mark script">Serenely Yours,</span>
    <span>Bespoke itinerary planning · <a href="mailto:hello@example.com">hello@serenachua.travel</a> <span class="tbc">[TBC]</span></span>
  </footer>

</body>
</html>
