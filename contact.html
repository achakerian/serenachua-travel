<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serena Chua Travel — Enquire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-contact light">

  <nav class="nav">
    <a class="nav__brand" href="index.html">SERENA CHUA<b>·</b>TRAVEL</a>
    <button class="nav__toggle" aria-label="Menu" onclick="this.nextElementSibling.classList.toggle('open')">Menu</button>
    <div class="nav__links">
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="packages.html">Trips</a>
      <a href="contact.html" aria-current="page">Enquire</a>
    </div>
    <span class="nav__code">SCT·005</span>
  </nav>

  <main class="wrap slip-wrap">
    <!-- Static sites can't email form data. Point action= at a Formspree
         (or Netlify Forms) endpoint: replace YOUR_FORM_ID below. -->
    <form class="slip" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <div class="slip__top">
        <h1>Booking request</h1>
        <span class="code">SCT · 005</span>
      </div>
      <div class="slip__body">
        <p>Even a rough idea is enough to start. I'll reply within a day.</p>
        <div class="form">
          <div class="form__row">
            <div class="field">
              <label for="name">Name</label>
              <input id="name" name="name" type="text" required>
            </div>
            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required>
            </div>
          </div>
          <div class="form__row">
            <div class="field">
              <label for="where">Where to</label>
              <input id="where" name="destination" type="text" placeholder="Anywhere you fancy">
            </div>
            <div class="field">
              <label for="when">Roughly when</label>
              <input id="when" name="dates" type="text" placeholder="e.g. Sept, flexible">
            </div>
          </div>
          <div class="field">
            <label for="message">The trip</label>
            <textarea id="message" name="message" placeholder="Who's going, the occasion, anything that helps."></textarea>
          </div>
          <div class="slip__submit">
            <button class="btn btn--ghost-dark" type="submit">Send request <span class="btn__arrow">→</span></button>
            <span class="code">No fee to enquire</span>
          </div>
        </div>
      </div>
    </form>
  </main>

  <footer class="foot">
    <span><span class="foot__mark">✦</span> Serena Chua Travel</span>
    <span><a href="mailto:hello@example.com">hello@serenachua.travel</a> <span class="tbc">[TBC]</span></span>
  </footer>

</body>
</html>
